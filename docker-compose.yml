services:
  scanner:
    build:
      context: .
      target: runner
    container_name: uae-turtle-trader
    volumes:
      # Persist price history and output between runs
      - ./data:/app/data
      - ./output:/app/output
      # Allow overriding config without rebuilding
      - ./config.toml:/app/config.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    # Override CMD to pass flags, e.g.:
    #   docker compose run scanner python scan.py --system 55
    command: python scan.py --no-browser
